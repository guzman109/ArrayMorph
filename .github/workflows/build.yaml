name: Release Shared Library

on:
  pull_request:
  push:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_shared_lib:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux, arch: x86_64, runner: ubuntu-latest }
          - { os: linux, arch: aarch64, runner: ubuntu-24.04-arm }
          - { os: macos, arch: arm64, runner: macos-14 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: release-conan-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('lib/conanfile.py') }}
          restore-keys: |
            release-conan-${{ matrix.os }}-${{ matrix.arch }}-

      # ── Linux: AlmaLinux 8 (manylinux_2_28) for glibc 2.28 compat ──
      # Python is only used to install Conan. No h5py.
      # HDF5 comes from Conan with shared=True override.
      - name: Build (Linux)
        if: matrix.os == 'linux'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -v "$HOME/.conan2:/root/.conan2" \
            -w /src \
            quay.io/pypa/manylinux_2_28_${{ matrix.arch }} \
            bash -exc '
              dnf install -y epel-release
              dnf install -y perl perl-IPC-Cmd ca-certificates ninja-build \
                             patchelf gcc-toolset-13-libatomic-devel

              # Python is ONLY used here to install Conan as a build tool
              export PATH="/opt/python/cp312-cp312/bin:$PATH"
              pip install "conan>=2,<3"

              conan profile detect --force

              # Override HDF5 to shared so we get a .so to link against.
              # The final binary will have its SONAME patched to generic libhdf5.so.310
              conan install lib \
                --build=missing \
                -of lib/build \
                -s build_type=Release \
                -o "hdf5/*:shared=True" \
                -c tools.system.package_manager:mode=install \
                -c tools.system.package_manager:sudo=True

              # Find Conan HDF5 shared lib directory
              HDF5_LIB=$(find /root/.conan2 -name "libhdf5.so" -path "*/hdf5/*" | head -1)
              if [ -z "$HDF5_LIB" ]; then
                echo "ERROR: Could not find Conan shared libhdf5.so"
                find /root/.conan2 -name "libhdf5*" -path "*/hdf5/*" 2>/dev/null
                exit 1
              fi
              HDF5_LIB_DIR=$(dirname "$HDF5_LIB")
              echo "Found HDF5 libs at: $HDF5_LIB_DIR"

              # Find the toolchain
              TOOLCHAIN=$(find lib/build -name conan_toolchain.cmake -type f | head -1)
              echo "Toolchain: $TOOLCHAIN"

              cmake -S lib -B build \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
                -DH5PY_HDF5_DIR="$HDF5_LIB_DIR"

              cmake --build build --config Release

              # Replace Conan SONAME with generic one
              SO=build/src/libarraymorph.so
              OLD_HDF5=$(readelf -d "$SO" | grep NEEDED | grep -oP "\[.*hdf5.*\]" | tr -d "[]")
              if [ -n "$OLD_HDF5" ]; then
                echo "Replacing NEEDED: $OLD_HDF5 -> libhdf5.so.310"
                patchelf --replace-needed "$OLD_HDF5" "libhdf5.so.310" "$SO"
              fi
              patchelf --set-rpath "\$ORIGIN" "$SO"
              strip "$SO"

              # Verify no unexpected deps
              echo "Final dependencies:"
              readelf -d "$SO" | grep NEEDED

              cp "$SO" /src/libarraymorph-linux-${{ matrix.arch }}.so
            '

      - name: Fix Conan cache permissions
        if: always() && matrix.os == 'linux'
        run: sudo find ~/.conan2 -type f -exec chmod a+r {} + ; sudo find ~/.conan2 -type d -exec chmod a+rx {} +

      # ── macOS: brew HDF5, no Python at all ──
      - name: Build (macOS)
        if: matrix.os == 'macos'
        run: |
          brew install ninja cmake hdf5

          python3 -m venv .venv
          .venv/bin/pip install "conan>=2,<3"
          export PATH="$(pwd)/.venv/bin:$PATH"

          conan profile detect --force
          conan install lib \
            --build=missing \
            -of lib/build \
            -s build_type=Release \
            -o "hdf5/*:shared=True"

          TOOLCHAIN=$(find lib/build -name conan_toolchain.cmake -type f | head -1)

          # Use brew HDF5 for runtime linking
          HDF5_LIB_DIR=$(brew --prefix hdf5)/lib

          cmake -S lib -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DH5PY_HDF5_DIR="$HDF5_LIB_DIR"

          cmake --build build --config Release

          DYLIB=$(find build -name "libarraymorph.dylib" -o -name "libarraymorph.so" | head -1)
          OUT=libarraymorph-macos-${{ matrix.arch }}.dylib

          # Replace brew-specific HDF5 path with generic rpath reference
          OLD_HDF5=$(otool -L "$DYLIB" | grep -i hdf5 | awk '{print $1}' | head -1)
          if [ -n "$OLD_HDF5" ]; then
            install_name_tool -change "$OLD_HDF5" "@rpath/libhdf5.310.dylib" "$DYLIB"
          fi
          install_name_tool -add_rpath @loader_path "$DYLIB" 2>/dev/null || true

          strip -x "$DYLIB"
          cp "$DYLIB" "$OUT"

          echo "Final dependencies:"
          otool -L "$OUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lib-${{ matrix.os }}-${{ matrix.arch }}
          path: libarraymorph-*
          retention-days: 7

  attach_to_release:
    name: Attach to GitHub Release
    needs: [build_shared_lib]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lib-*
          merge-multiple: true
          path: libs/

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for f in libs/libarraymorph-*; do
            echo "Uploading $f"
            gh release upload "${{ github.event.release.tag_name }}" "$f" \
              --repo "${{ github.repository }}"
          done
