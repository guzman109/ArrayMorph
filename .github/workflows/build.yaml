name: Build, Test, and Publish

on:
  pull_request:
  push:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_linux_wheels:
    name: Build (linux / ${{ matrix.arch }} / py${{ matrix.python }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            container: quay.io/pypa/manylinux_2_28_x86_64
            python: '3.10'
          - arch: x86_64
            runner: ubuntu-latest
            container: quay.io/pypa/manylinux_2_28_x86_64
            python: '3.11'
          - arch: x86_64
            runner: ubuntu-latest
            container: quay.io/pypa/manylinux_2_28_x86_64
            python: '3.12'
          - arch: x86_64
            runner: ubuntu-latest
            container: quay.io/pypa/manylinux_2_28_x86_64
            python: '3.13'
          - arch: aarch64
            runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            python: '3.10'
          - arch: aarch64
            runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            python: '3.11'
          - arch: aarch64
            runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            python: '3.12'
          - arch: aarch64
            runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            python: '3.13'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.10.6'
          python-version: ${{ matrix.python }}
          enable-cache: true

      - name: Install system deps
        run: |
          dnf install -y \
            git curl ca-certificates \
            zip unzip tar which file \
            cmake ninja-build pkgconf-pkg-config \
            gcc gcc-c++ make \
            perl perl-IPC-Cmd perl-ExtUtils-MakeMaker \
            autoconf automake libtool m4 patchelf

      - name: Configure Python env
        run: |
          uv venv --clear --python ${{ matrix.python }}
          echo "${GITHUB_WORKSPACE}/.venv/bin" >> "$GITHUB_PATH"

      - name: Cache Conan
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-linux-${{ matrix.arch }}-py${{ matrix.python }}-${{ hashFiles('lib/conanfile.py', 'pyproject.toml') }}
          restore-keys: |
            conan-linux-${{ matrix.arch }}-

      - name: Install Python build tools
        run: |
          uv pip install --python .venv/bin/python \
            build \
            scikit-build-core \
            conan \
            "h5py>=3.10,<3.16" \
            auditwheel

      - name: Detect Conan profile
        run: .venv/bin/conan profile detect --force

      - name: Create Conan lockfile
        run: .venv/bin/conan lock create lib -s build_type=Release --lockfile-out=lib/conan.lock

      - name: Install Conan dependencies
        run: .venv/bin/conan install lib --lockfile=lib/conan.lock --build=missing -of lib/build

      - name: Build wheel
        shell: bash
        run: |
          set -euo pipefail
          CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/lib/build/build/Release/generators/conan_toolchain.cmake" \
          .venv/bin/python -m build --wheel --no-isolation

      - name: Repair wheel
        shell: bash
        run: |
          set -euo pipefail
          export LD_LIBRARY_PATH="$(.venv/bin/python -c 'import h5py, os; d=os.path.dirname(h5py.__file__); print(os.path.join(d, ".dylibs") if os.path.exists(os.path.join(d, ".dylibs")) else os.path.join(os.path.dirname(d), "h5py.libs"))'):${LD_LIBRARY_PATH:-}"
          auditwheel show dist/*.whl
          auditwheel repair dist/*.whl -w wheelhouse/ \
            --exclude libhdf5.so \
            --exclude libhdf5.so.310 \
            --exclude libhdf5_hl.so \
            --exclude libhdf5_hl.so.310

      - name: Create test venv
        run: uv venv .test-venv --clear --python ${{ matrix.python }}

      - name: Install built wheel
        run: uv pip install --python .test-venv/bin/python wheelhouse/*.whl

      - name: Smoke test
        run: |
          .test-venv/bin/python - <<'PY'
          import arraymorph
          import h5py
          print('arraymorph', arraymorph.get_plugin_path())
          print('h5py', h5py.__version__, h5py.version.hdf5_version)
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.arch }}-py${{ matrix.python }}
          path: wheelhouse/*.whl
          retention-days: 7

      - name: Upload Conan lockfile artifact
        uses: actions/upload-artifact@v4
        with:
          name: conan-lock-linux-${{ matrix.arch }}-py${{ matrix.python }}
          path: lib/conan.lock
          retention-days: 7

  build_macos_wheels:
    name: Build (macos / arm64 / py${{ matrix.python }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.10.6'
          python-version: ${{ matrix.python }}
          enable-cache: true

      - name: Install system deps
        run: |
          brew update
          brew install ninja cmake curl openssl autoconf automake libtool pkg-config

      - name: Configure Python env
        run: |
          uv venv --clear --python ${{ matrix.python }}
          echo "${GITHUB_WORKSPACE}/.venv/bin" >> "$GITHUB_PATH"

      - name: Cache Conan
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-macos-arm64-py${{ matrix.python }}-${{ hashFiles('lib/conanfile.py', 'pyproject.toml') }}
          restore-keys: |
            conan-macos-arm64-

      - name: Install Python build tools
        run: |
          uv pip install --python .venv/bin/python \
            build \
            scikit-build-core \
            conan \
            "h5py>=3.10,<3.16" \
            delocate

      - name: Detect Conan profile
        run: .venv/bin/conan profile detect --force

      - name: Create Conan lockfile
        run: .venv/bin/conan lock create lib -s build_type=Release --lockfile-out=lib/conan.lock

      - name: Install Conan dependencies
        run: .venv/bin/conan install lib --lockfile=lib/conan.lock --build=missing -of lib/build

      - name: Build wheel
        shell: bash
        run: |
          set -euo pipefail
          CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/lib/build/build/Release/generators/conan_toolchain.cmake" \
          .venv/bin/python -m build --wheel --no-isolation

      - name: Repair wheel
        shell: bash
        run: |
          set -euo pipefail
          export DYLD_LIBRARY_PATH="$(.venv/bin/python -c 'import h5py, os; d=os.path.dirname(h5py.__file__); print(os.path.join(d, ".dylibs") if os.path.exists(os.path.join(d, ".dylibs")) else os.path.join(os.path.dirname(d), "h5py.libs"))'):${DYLD_LIBRARY_PATH:-}"
          delocate-listdeps dist/*.whl
          delocate-wheel -w wheelhouse/ dist/*.whl \
            --exclude libhdf5 \
            --exclude libhdf5_hl

      - name: Create test venv
        run: uv venv .test-venv --clear --python ${{ matrix.python }}

      - name: Install built wheel
        run: uv pip install --python .test-venv/bin/python wheelhouse/*.whl

      - name: Smoke test
        run: |
          .test-venv/bin/python - <<'PY'
          import arraymorph
          import h5py
          print('arraymorph', arraymorph.get_plugin_path())
          print('h5py', h5py.__version__, h5py.version.hdf5_version)
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-arm64-py${{ matrix.python }}
          path: wheelhouse/*.whl
          retention-days: 7

      - name: Upload Conan lockfile artifact
        uses: actions/upload-artifact@v4
        with:
          name: conan-lock-macos-arm64-py${{ matrix.python }}
          path: lib/conan.lock
          retention-days: 7

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.10.6'
          python-version: '3.12'
          enable-cache: true

      - name: Build sdist
        run: uv build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

  publish_testpypi:
    name: Publish to TestPyPI
    needs: [build_linux_wheels, build_macos_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'release'
    permissions:
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/arraymorph

    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.10.6'

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Publish to TestPyPI
        run: uv publish dist/* --publish-url https://test.pypi.org/legacy/ --check-url https://test.pypi.org/simple/ --skip-existing

  test_testpypi:
    name: Test TestPyPI (${{ matrix.os }})
    needs: [publish_testpypi]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
          - os: macos
            runner: macos-latest

    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.10.6'
          python-version: '3.12'
          enable-cache: true

      - name: Install from TestPyPI
        run: |
          uv venv --clear --python 3.12
          uv pip install --python .venv/bin/python \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            arraymorph

      - name: Test import
        run: .venv/bin/python -c "import arraymorph; print('arraymorph imported successfully')"

  publish:
    name: Publish to PyPI
    needs: [test_testpypi]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/arraymorph
    permissions:
      id-token: write

    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.10.6'

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Publish to PyPI
        run: uv publish dist/*
