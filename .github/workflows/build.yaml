name: Build, Test, and Publish

on:
  pull_request:
  push:
  release:
    types: [published]
  workflow_dispatch:

env:
  CONAN_CACHE_DIR: /home/runner/.conan2

jobs:
  build_wheels:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            arch: x86_64
            runner: ubuntu-latest
          - label: linux-aarch64
            arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Conan cache dir
        run: mkdir -p "$CONAN_CACHE_DIR"

      - name: Cache Conan
        uses: actions/cache@v4
        with:
          path: ${{ env.CONAN_CACHE_DIR }}
          key: conan-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('lib/conanfile.py', 'pyproject.toml') }}
          restore-keys: |
            conan-${{ runner.os }}-${{ matrix.arch }}-

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2.1
        env:
          CIBW_PLATFORM: linux
          CIBW_ARCHS_LINUX: ${{ matrix.arch }}
          CIBW_CONTAINER_ENGINE: "docker; create_args: --volume /home/runner/.conan2:/root/.conan2"
        with:
          output-dir: wheelhouse

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.label }}
          path: wheelhouse/*.whl
          retention-days: 7

      - name: Upload Conan lockfile artifact
        uses: actions/upload-artifact@v4
        with:
          name: conan-lock-${{ matrix.label }}
          path: lib/conan.lock
          retention-days: 7

      - name: Extract native libraries from wheels
        if: github.event_name == 'release'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p extracted_lib
          shopt -s nullglob
          for wheel_file in wheelhouse/*.whl; do
            wheel_name=$(basename "$wheel_file" .whl)
            unzip -j "$wheel_file" "arraymorph/lib/libarraymorph*" -d extracted_lib/
            lib_file=$(ls extracted_lib/libarraymorph* | head -1)
            ext="${lib_file##*.}"
            py_tag=$(echo "$wheel_name" | cut -d- -f3)
            out_file="libarraymorph-${{ matrix.arch }}-${py_tag}.${ext}"
            mv "$lib_file" "$out_file"
            rm -f extracted_lib/libarraymorph*
          done

      - name: Attach native libraries to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: libarraymorph-*

  publish_testpypi:
    name: Publish to TestPyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'release'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/arraymorph
    permissions:
      id-token: write

    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish to TestPyPI
        run: uv publish --publish-url https://test.pypi.org/legacy/ --check-url https://test.pypi.org/simple/ --skip-existing dist/*

  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/arraymorph
    permissions:
      id-token: write

    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        run: uv publish dist/*
