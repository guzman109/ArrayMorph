name: Release Shared Library

on:
  pull_request:
  push:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_shared_lib:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,  arch: x86_64,  runner: ubuntu-latest }
          - { os: linux,  arch: aarch64, runner: ubuntu-24.04-arm }
          - { os: macos,  arch: arm64,   runner: macos-14 }
          - { os: macos,  arch: x86_64,  runner: macos-13 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Linux: build inside manylinux_2_28 container ──
      - name: Build (Linux)
        if: matrix.os == 'linux'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -v "$HOME/.conan2:/root/.conan2" \
            -w /src \
            quay.io/pypa/manylinux_2_28_${{ matrix.arch }} \
            bash -exc '
              # System deps
              dnf install -y epel-release
              dnf install -y perl perl-IPC-Cmd ca-certificates ninja-build \
                             patchelf gcc-toolset-13-libatomic-devel

              # Python + build deps
              /opt/python/cp312-cp312/bin/pip install "conan>=2,<3" "h5py>=3.11,<3.13"
              export PATH="/opt/python/cp312-cp312/bin:$PATH"

              # Conan
              conan profile detect --force
              conan install lib \
                --build=missing \
                -of lib/build \
                -s build_type=Release \
                -c tools.system.package_manager:mode=install \
                -c tools.system.package_manager:sudo=True

              # CMake build
              cmake -S lib -B build \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_TOOLCHAIN_FILE=lib/build/build/Release/generators/conan_toolchain.cmake

              cmake --build build --config Release

              # Post-process: replace h5py mangled SONAME with generic one
              SO=build/src/libarraymorph.so
              OLD_HDF5=$(readelf -d "$SO" | grep NEEDED | grep -i hdf5 | sed "s/.*\[\(.*\)\]/\1/")
              if [ -n "$OLD_HDF5" ]; then
                patchelf --replace-needed "$OLD_HDF5" "libhdf5.so.310" "$SO"
              fi
              patchelf --set-rpath "\$ORIGIN" "$SO"

              strip "$SO"
              cp "$SO" /src/libarraymorph-linux-${{ matrix.arch }}.so
            '

      # ── macOS: build natively ──
      - name: Install deps (macOS)
        if: matrix.os == 'macos'
        run: |
          brew install ninja cmake patchelf
          pip3 install "conan>=2,<3" "h5py>=3.11,<3.13"

      - name: Build (macOS)
        if: matrix.os == 'macos'
        run: |
          conan profile detect --force
          conan install lib \
            --build=missing \
            -of lib/build \
            -s build_type=Release

          cmake -S lib -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=lib/build/build/Release/generators/conan_toolchain.cmake

          cmake --build build --config Release

          DYLIB=build/src/libarraymorph.dylib

          # Replace h5py-specific HDF5 reference with generic one
          OLD_HDF5=$(otool -L "$DYLIB" | grep -i hdf5 | awk '{print $1}' | head -1)
          if [ -n "$OLD_HDF5" ]; then
            install_name_tool -change "$OLD_HDF5" "@rpath/libhdf5.dylib" "$DYLIB"
          fi
          install_name_tool -add_rpath @loader_path "$DYLIB" 2>/dev/null || true

          strip -x "$DYLIB"
          cp "$DYLIB" libarraymorph-macos-${{ matrix.arch }}.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lib-${{ matrix.os }}-${{ matrix.arch }}
          path: libarraymorph-*
          retention-days: 7

  attach_to_release:
    name: Attach to GitHub Release
    needs: [build_shared_lib]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lib-*
          merge-multiple: true
          path: libs/

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for f in libs/libarraymorph-*; do
            echo "Uploading $f"
            gh release upload "${{ github.event.release.tag_name }}" "$f" \
              --repo "${{ github.repository }}"
          done
